spring.application.name=DataHub
server.port=9093

# Stubbed storage location. Replace with the real path when DataHub owns durable local storage.
datahub.storage.location=TODO_SET_DATAHUB_STORAGE_LOCATION

# Lightweight MySQL wiring. Create this database/user locally when ready.
spring.datasource.url=jdbc:mysql://localhost:3306/datahub
spring.datasource.username=datahub_user
spring.datasource.password=CHANGE_ME
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=never

# Trusted app/device public keys. Each app keeps the private key half and signs requests.
# Format: appName:keyId:base64X509Ed25519PublicKey:READ|WRITE,appName2:keyId2:base64PublicKey:READ
# Replace this placeholder before running outside local development.
datahub.auth.clients=SmartDeviceManager:smart-device-manager-key:CHANGE_ME_BASE64_X509_ED25519_PUBLIC_KEY:READ|WRITE

# New key pairing must go through YubiKey proof validation. Leave disabled until a real verifier is wired.
datahub.auth.yubikey.enabled=false
datahub.auth.yubikey.accepted-proof=CHANGE_ME_YUBIKEY_PAIRING_PROOF
